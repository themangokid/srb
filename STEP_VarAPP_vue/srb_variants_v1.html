<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRB · Textvarianter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.4.21/vue.global.prod.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #f5f0e8;
    --bg2:      #ede7d9;
    --bg3:      #e4dccb;
    --ink:      #1e1a14;
    --ink2:     #4a4236;
    --ink3:     #7a6f60;
    --gold:     #8b6914;
    --gold2:    #c49a2a;
    --tr:       #2a5c3f;
    --tr-light: #e8f2ec;
    --na:       #7a2020;
    --na-light: #f5e8e8;
    --mix:      #1a3a5c;
    --mix-light:#e8eef5;
    --border:   #cdc4b0;
    --mono:     'JetBrains Mono', monospace;
    --serif:    'EB Garamond', Georgia, serif;
  }

  html { font-size: 16px; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--serif);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--ink);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    border-bottom: 2px solid var(--gold);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--gold2);
    letter-spacing: 0.08em;
    white-space: nowrap;
  }
  .logo span { color: #fff; font-weight: 400; }

  .search-wrap {
    flex: 1;
    max-width: 520px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: #2a2620;
    border: 1px solid #4a4236;
    color: #f5f0e8;
    font-family: var(--serif);
    font-size: 1rem;
    padding: 0.5rem 1rem 0.5rem 2.4rem;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input::placeholder { color: #7a6f60; }
  .search-wrap input:focus { border-color: var(--gold2); }
  .search-icon {
    position: absolute;
    left: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink3);
    font-size: 0.9rem;
    pointer-events: none;
  }

  .filter-pills {
    display: flex;
    gap: 0.4rem;
    flex-shrink: 0;
  }
  .pill {
    padding: 0.3rem 0.75rem;
    border-radius: 999px;
    border: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.12s;
    background: transparent;
    color: #aaa;
    letter-spacing: 0.04em;
  }
  .pill.active-all  { background: var(--gold);  border-color: var(--gold);  color: #fff; }
  .pill.active-nt   { background: var(--tr);    border-color: var(--tr);    color: #fff; }
  .pill.active-ot   { background: var(--mix);   border-color: var(--mix);   color: #fff; }
  .pill.active-var  { background: var(--na);    border-color: var(--na);    color: #fff; }

  .stats {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: #7a6f60;
    white-space: nowrap;
  }

  /* ── Main layout ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1.5rem 2rem 4rem;
  }

  /* ── Empty / loading ── */
  .empty {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--ink3);
    font-size: 1.1rem;
    font-style: italic;
  }
  .empty strong { display: block; font-size: 2rem; margin-bottom: 0.5rem; font-style: normal; color: var(--border); }

  /* ── Verse card ── */
  .verse-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 0.75rem;
    overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .verse-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }

  .card-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.65rem 1rem;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .ref-badge {
    font-family: var(--mono);
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.03em;
    min-width: 90px;
  }
  .testament-tag {
    font-family: var(--mono);
    font-size: 0.65rem;
    padding: 0.15rem 0.5rem;
    border-radius: 3px;
    letter-spacing: 0.06em;
    font-weight: 500;
  }
  .tag-nt { background: var(--tr-light); color: var(--tr); }
  .tag-ot { background: var(--mix-light); color: var(--mix); }

  .variant-counts {
    display: flex;
    gap: 0.4rem;
    flex: 1;
  }
  .vc-tag {
    font-family: var(--mono);
    font-size: 0.65rem;
    padding: 0.15rem 0.5rem;
    border-radius: 3px;
  }
  .vc-tr  { background: var(--tr-light);  color: var(--tr); }
  .vc-na  { background: var(--na-light);  color: var(--na); }
  .vc-mix { background: var(--mix-light); color: var(--mix); }
  .vc-ot  { background: var(--bg3); color: var(--ink2); }

  .expand-btn {
    margin-left: auto;
    color: var(--ink3);
    font-size: 0.8rem;
    transition: transform 0.2s;
  }
  .expand-btn.open { transform: rotate(180deg); }

  .stepbible-link {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--gold);
    text-decoration: none;
    padding: 0.2rem 0.5rem;
    border: 1px solid var(--gold);
    border-radius: 3px;
    white-space: nowrap;
    transition: all 0.12s;
  }
  .stepbible-link:hover { background: var(--gold); color: #fff; }

  /* ── Card body ── */
  .card-body {
    padding: 1rem;
  }

  /* NT sections */
  .section-label {
    font-family: var(--mono);
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 0.5rem;
    padding-bottom: 0.3rem;
    border-bottom: 1px solid var(--border);
  }
  .section + .section { margin-top: 1rem; }

  .word-row {
    display: grid;
    grid-template-columns: 2rem 1fr 1fr 1fr auto;
    gap: 0.25rem 0.75rem;
    align-items: baseline;
    padding: 0.3rem 0;
    border-bottom: 1px solid #f0ebe0;
    font-size: 0.9rem;
  }
  .word-row:last-child { border-bottom: none; }
  .word-num { font-family: var(--mono); font-size: 0.65rem; color: var(--ink3); }
  .word-greek { font-size: 1.05rem; color: var(--ink); }
  .word-translit { font-style: italic; color: var(--ink3); font-size: 0.85rem; }
  .word-english { color: var(--ink2); font-size: 0.88rem; }
  .word-type-badge {
    font-family: var(--mono);
    font-size: 0.6rem;
    padding: 0.1rem 0.4rem;
    border-radius: 2px;
    white-space: nowrap;
    font-weight: 500;
  }
  .wt-K  { background: var(--tr-light);  color: var(--tr); }
  .wt-k  { background: #f0f5f2; color: #4a7a5c; }
  .wt-N  { background: var(--na-light);  color: var(--na); }
  .wt-n  { background: #f5efef; color: #9a5050; }
  .wt-NK { background: var(--mix-light); color: var(--mix); }

  .variant-note {
    grid-column: 1 / -1;
    font-size: 0.82rem;
    color: var(--ink2);
    padding: 0.4rem 0.5rem;
    background: var(--bg);
    border-left: 2px solid var(--gold2);
    border-radius: 0 3px 3px 0;
    margin-top: 0.15rem;
    font-style: italic;
    line-height: 1.5;
  }
  .variant-note i { font-style: normal; font-family: var(--mono); font-size: 0.78rem; }

  /* OT word rows */
  .ot-word-row {
    padding: 0.4rem 0;
    border-bottom: 1px solid #f0ebe0;
    font-size: 0.9rem;
  }
  .ot-word-row:last-child { border-bottom: none; }
  .ot-top {
    display: grid;
    grid-template-columns: 2rem auto 1fr auto auto;
    gap: 0.25rem 0.75rem;
    align-items: baseline;
  }
  .ot-hebrew {
    font-size: 1.1rem;
    direction: rtl;
    color: var(--ink);
    font-family: 'EB Garamond', serif;
  }
  .ot-translit { font-style: italic; color: var(--ink3); font-size: 0.82rem; }
  .ot-english { color: var(--ink2); font-size: 0.88rem; }
  .ot-type-badge {
    font-family: var(--mono);
    font-size: 0.6rem;
    padding: 0.1rem 0.4rem;
    border-radius: 2px;
    white-space: nowrap;
  }
  .sig-yes { background: var(--na-light); color: var(--na); }
  .sig-no  { background: var(--bg3); color: var(--ink3); }
  .ot-meaning {
    margin-top: 0.3rem;
    font-size: 0.8rem;
    color: var(--ink2);
    padding: 0.3rem 0.5rem;
    background: var(--bg);
    border-left: 2px solid var(--gold2);
    font-style: italic;
    line-height: 1.5;
  }

  /* ── Pagination ── */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin-top: 1.5rem;
    font-family: var(--mono);
    font-size: 0.8rem;
  }
  .pagination button {
    background: #fff;
    border: 1px solid var(--border);
    color: var(--ink2);
    padding: 0.3rem 0.75rem;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .pagination button:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); }
  .pagination button:disabled { opacity: 0.35; cursor: default; }
  .pagination .page-info { color: var(--ink3); padding: 0 0.5rem; }
</style>
</head>
<body>
<div id="app" v-cloak>

  <header>
    <div class="logo">SRB <span>·</span> Varianter</div>

    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input
        v-model="query"
        @input="onSearch"
        placeholder="Sök vers, t.ex. Rom 8:1 eller Matt 5..."
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <div class="filter-pills">
      <button class="pill" :class="{'active-all': filter==='all'}"  @click="setFilter('all')">Alla</button>
      <button class="pill" :class="{'active-nt':  filter==='NT'}"   @click="setFilter('NT')">NT</button>
      <button class="pill" :class="{'active-ot':  filter==='OT'}"   @click="setFilter('OT')">GT</button>
      <button class="pill" :class="{'active-var': filter==='var'}"  @click="setFilter('var')">Varianter</button>
    </div>

    <div class="stats">{{ filteredCount.toLocaleString('sv') }} vers</div>
  </header>

  <main>
    <div v-if="loading" class="empty">
      <strong>⟳</strong>Laddar data…
    </div>

    <div v-else-if="pageItems.length === 0" class="empty">
      <strong>∅</strong>Inga resultat för "{{ query }}"
    </div>

    <template v-else>
      <div
        v-for="item in pageItems"
        :key="item.ref"
        class="verse-card"
      >
        <!-- Card header -->
        <div class="card-header" @click="toggle(item.ref)">
          <span class="ref-badge">{{ formatRef(item.ref) }}</span>
          <span class="testament-tag" :class="item.data.testament==='NT' ? 'tag-nt' : 'tag-ot'">
            {{ item.data.testament === 'NT' ? 'NT' : 'GT' }}
          </span>

          <div class="variant-counts" v-if="item.data.testament==='NT'">
            <span class="vc-tag vc-tr"  v-if="item.data.tr_words.length">
              {{ item.data.tr_words.length }} TR
            </span>
            <span class="vc-tag vc-na"  v-if="item.data.na_only_words.length">
              {{ item.data.na_only_words.length }} NA
            </span>
            <span class="vc-tag vc-mix" v-if="item.data.mixed_words.length">
              {{ item.data.mixed_words.length }} mix
            </span>
          </div>
          <div class="variant-counts" v-else>
            <span class="vc-tag vc-ot" v-if="item.data.variant_words && item.data.variant_words.length">
              {{ item.data.variant_words.length }} var
            </span>
          </div>

          <a
            :href="item.data.stepbible_url"
            target="_blank"
            class="stepbible-link"
            @click.stop
          >STEPBible ↗</a>

          <span class="expand-btn" :class="{open: expanded[item.ref]}">▾</span>
        </div>

        <!-- Card body -->
        <div class="card-body" v-if="expanded[item.ref]">

          <!-- NT -->
          <template v-if="item.data.testament==='NT'">

            <!-- TR-only words -->
            <div class="section" v-if="item.data.tr_words.length">
              <div class="section-label">TR / Byz — ej i kritisk text</div>
              <div v-for="w in item.data.tr_words" :key="w.word_num" class="word-row">
                <span class="word-num">#{{ w.word_num }}</span>
                <span class="word-greek">{{ w.greek }}</span>
                <span class="word-translit">{{ w.transliteration }}</span>
                <span class="word-english">{{ w.english }}</span>
                <span class="word-type-badge" :class="'wt-'+w.word_type.charAt(0)">{{ w.word_type }}</span>
                <div class="variant-note" v-if="w.variant_note && w.variant_note.length > 2" v-html="cleanNote(w.variant_note)"></div>
              </div>
            </div>

            <!-- NA-only words -->
            <div class="section" v-if="item.data.na_only_words.length">
              <div class="section-label">NA — ej i TR</div>
              <div v-for="w in item.data.na_only_words" :key="w.word_num" class="word-row">
                <span class="word-num">#{{ w.word_num }}</span>
                <span class="word-greek">{{ w.greek }}</span>
                <span class="word-translit">{{ w.transliteration }}</span>
                <span class="word-english">{{ w.english }}</span>
                <span class="word-type-badge wt-N">{{ w.word_type }}</span>
                <div class="variant-note" v-if="w.variant_note && w.variant_note.length > 2" v-html="cleanNote(w.variant_note)"></div>
              </div>
            </div>

            <!-- Mixed -->
            <div class="section" v-if="item.data.mixed_words.length">
              <div class="section-label">Olika läsart mellan TR och NA</div>
              <div v-for="w in item.data.mixed_words" :key="w.word_num" class="word-row">
                <span class="word-num">#{{ w.word_num }}</span>
                <span class="word-greek">{{ w.greek }}</span>
                <span class="word-translit">{{ w.transliteration }}</span>
                <span class="word-english">{{ w.english }}</span>
                <span class="word-type-badge wt-NK">{{ w.word_type }}</span>
                <div class="variant-note" v-if="w.variant_note && w.variant_note.length > 2" v-html="cleanNote(w.variant_note)"></div>
              </div>
            </div>

          </template>

          <!-- OT -->
          <template v-else>
            <div class="section" v-if="item.data.variant_words && item.data.variant_words.length">
              <div class="section-label">Textvarianter</div>
              <div v-for="w in item.data.variant_words" :key="w.word_num" class="ot-word-row">
                <div class="ot-top">
                  <span class="word-num">#{{ w.word_num }}</span>
                  <span class="ot-hebrew">{{ w.hebrew }}</span>
                  <span class="ot-translit">{{ w.transliteration }}</span>
                  <span class="ot-english">{{ w.english }}</span>
                  <span class="ot-type-badge" :class="w.significant ? 'sig-yes' : 'sig-no'">{{ w.text_type }}</span>
                </div>
                <div class="ot-meaning" v-if="w.meaning_variant">{{ w.meaning_variant }}</div>
              </div>
            </div>
          </template>

        </div><!-- /card-body -->
      </div><!-- /verse-card -->

      <!-- Pagination -->
      <div class="pagination" v-if="totalPages > 1">
        <button @click="page=1"    :disabled="page===1">«</button>
        <button @click="page--"    :disabled="page===1">‹</button>
        <span class="page-info">{{ page }} / {{ totalPages }}</span>
        <button @click="page++"    :disabled="page===totalPages">›</button>
        <button @click="page=totalPages" :disabled="page===totalPages">»</button>
      </div>
    </template>
  </main>
</div>

<script>
const { createApp, ref, computed, reactive, watch } = Vue;

createApp({
  setup() {
    const allData   = ref({});
    const loading   = ref(true);
    const query     = ref('');
    const filter    = ref('var');   // default: show only verses with variants
    const expanded  = reactive({});
    const page      = ref(1);
    const PER_PAGE  = 50;

    // Load JSON - expects bible_variants.json in same folder
    fetch('bible_variants.json')
      .then(r => r.json())
      .then(d => { allData.value = d; loading.value = false; })
      .catch(() => { loading.value = false; });

    // Convert "Rom 8:1" style query to "Rom.8.1"
    function normalizeQuery(q) {
      return q.trim()
        .replace(/\s+/g, ' ')
        .replace(/^(\d?\s?[A-Za-zÅåÄäÖö]+)\s+(\d+)[:.:](\d+)/, (_, b, c, v) => {
          return toBookCode(b) + '.' + c + '.' + v;
        })
        .replace(/^(\d?\s?[A-Za-zÅåÄäÖö]+)\s+(\d+)$/, (_, b, c) => {
          return toBookCode(b) + '.' + c;
        });
    }

    // Swedish + English book name → TAGNT code
    const BOOK_ALIASES = {
      '1mos':'Gen','2mos':'Exo','3mos':'Lev','4mos':'Num','5mos':'Deu',
      'gen':'Gen','exo':'Exo','lev':'Lev','num':'Num','deu':'Deu',
      'jos':'Jos','dom':'Jdg','jdg':'Jdg','rut':'Rut',
      '1sam':'1Sa','2sam':'2Sa','1sa':'1Sa','2sa':'2Sa',
      '1kung':'1Ki','2kung':'2Ki','1ki':'1Ki','2ki':'2Ki',
      '1krön':'1Ch','2krön':'2Ch','1ch':'1Ch','2ch':'2Ch',
      'esra':'Ezr','ezr':'Ezr','neh':'Neh','est':'Est',
      'job':'Job','ps':'Psa','psa':'Psa','psalt':'Psa','psaltaren':'Psa',
      'ords':'Pro','pro':'Pro','pred':'Ecc','ecc':'Ecc','hv':'Sng','sng':'Sng',
      'jes':'Isa','isa':'Isa','jer':'Jer','klag':'Lam','lam':'Lam',
      'hes':'Ezk','ezk':'Ezk','dan':'Dan',
      'hos':'Hos','joel':'Jol','jol':'Jol','amos':'Amo','amo':'Amo',
      'ob':'Oba','oba':'Oba','jon':'Jon','mik':'Mic','mic':'Mic',
      'nah':'Nam','nam':'Nam','hab':'Hab','sef':'Zep','zep':'Zep',
      'hag':'Hag','sak':'Zec','zec':'Zec','mal':'Mal',
      'matt':'Mat','mat':'Mat','mark':'Mrk','mrk':'Mrk',
      'luk':'Luk','joh':'Jhn','jhn':'Jhn',
      'apg':'Act','act':'Act',
      'rom':'Rom',
      '1kor':'1Co','2kor':'2Co','1co':'1Co','2co':'2Co',
      'gal':'Gal','ef':'Eph','eph':'Eph',
      'fil':'Php','php':'Php','kol':'Col','col':'Col',
      '1tess':'1Th','2tess':'2Th','1th':'1Th','2th':'2Th',
      '1tim':'1Ti','2tim':'2Ti','1ti':'1Ti','2ti':'2Ti',
      'tit':'Tit','filem':'Phm','phm':'Phm',
      'hebr':'Heb','heb':'Heb',
      'jak':'Jas','jas':'Jas',
      '1pet':'1Pe','2pet':'2Pe','1pe':'1Pe','2pe':'2Pe',
      '1joh':'1Jn','2joh':'2Jn','3joh':'3Jn','1jn':'1Jn','2jn':'2Jn','3jn':'3Jn',
      'jud':'Jud','upp':'Rev','rev':'Rev'
    };

    function toBookCode(name) {
      const n = name.toLowerCase().replace(/\s/g,'').replace(/\./g,'');
      return BOOK_ALIASES[n] || name;
    }

    const filtered = computed(() => {
      const q = normalizeQuery(query.value).toLowerCase();
      const entries = Object.entries(allData.value);
      return entries.filter(([ref, v]) => {
        // Filter tab
        if (filter.value === 'NT'  && v.testament !== 'NT') return false;
        if (filter.value === 'OT'  && v.testament !== 'OT') return false;
        if (filter.value === 'var' && !v.has_variant) return false;
        // Search
        if (!q) return true;
        return ref.toLowerCase().includes(q);
      }).map(([ref, data]) => ({ ref, data }));
    });

    const filteredCount = computed(() => filtered.value.length);
    const totalPages    = computed(() => Math.max(1, Math.ceil(filtered.value.length / PER_PAGE)));
    const pageItems     = computed(() => {
      const s = (page.value - 1) * PER_PAGE;
      return filtered.value.slice(s, s + PER_PAGE);
    });

    // Reset page on filter/search change
    watch([query, filter], () => { page.value = 1; });

    function onSearch() { page.value = 1; }

    function setFilter(f) {
      filter.value = f;
      page.value   = 1;
    }

    function toggle(ref) {
      expanded[ref] = !expanded[ref];
    }

    function formatRef(ref) {
      // "Rom.8.1" → "Rom 8:1"
      return ref.replace(/^([^.]+)\.(\d+)\.(\d+)$/, '$1 $2:$3');
    }

    function cleanNote(note) {
      // Strip leading "^ " marker, keep <i> tags, trim whitespace runs
      return note
        .replace(/^\^\s*/, '')
        .replace(/\s{2,}/g, ' ')
        .trim();
    }

    return {
      loading, query, filter, expanded, page,
      filtered, filteredCount, totalPages, pageItems,
      onSearch, setFilter, toggle, formatRef, cleanNote
    };
  }
}).mount('#app');
</script>
</body>
</html>
