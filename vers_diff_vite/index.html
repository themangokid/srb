<script>
  // --- VISITOR ID ---
  let visitor_id = localStorage.getItem('vid');
  if (!visitor_id) {
    visitor_id = crypto.randomUUID();
    localStorage.setItem('vid', visitor_id);
  }

  let session_id = sessionStorage.getItem('sid');
  if (!session_id) {
    session_id = crypto.randomUUID();
    sessionStorage.setItem('sid', session_id);
  }

  const startTime = Date.now();

  const device = {
    screen_width: screen.width,
    screen_height: screen.height,
    window_width: window.innerWidth,
    window_height: window.innerHeight,
    user_agent: navigator.userAgent,
    language: navigator.language,
    platform: navigator.platform,
    is_online: navigator.onLine,
    pixel_ratio: window.devicePixelRatio,
    connection_type: navigator.connection?.effectiveType || null,
    connection_speed: navigator.connection?.downlink || null,
  };

  window.addEventListener('beforeunload', () => {
    const seconds_spent = Math.round((Date.now() - startTime) / 1000);

    fetch('https://lpxrhpaauklyhwjrmfhe.supabase.co/rest/v1/visits_v2', {
